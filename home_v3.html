<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ソフトボール・スコア</title>
    <link rel="stylesheet" href="style_v3.css">
</head>
<body>

    <!-- タイマー -->
    <div class="controls">
        <button id="time-start" class="btn">試合開始</button>
        <button id="time-reset" class="btn">リセット</button>
        <div class="time-info">
            <p>開始 : <span id="displayStartTime">-:-</span></p>
            <p>経過 : <span id="displayElapsedTime">開始前</span></p>
        </div>
    </div>

    <!-- スコアボード -->
    <div class="scoreboard-container">
        <table class="score-table">
            <thead id="scoreboard-head"></thead>
            <tbody id="scoreboard-body"></tbody>
        </table>
    </div>

    <!-- BSO + ランナー -->
    <div class="score-board">
        <div class="status-container">
            <div class="bso-area">
                <div class="counter-row">
                    <span class="label">B</span>
                    <div id="ball-dots" class="dots"></div>
                </div>
                <div class="counter-row">
                    <span class="label">S</span>
                    <div id="strike-dots" class="dots"></div>
                </div>
                <div class="counter-row">
                    <span class="label">O</span>
                    <div id="out-dots" class="dots"></div>
                </div>
            </div>
            <div class="runner-area">
                <!--
                  ダイヤモンド: SVGで直接座標指定
                  ホーム=下中央、1塁=右、2塁=上中央、3塁=左
                  viewBox 0 0 100 100 で正規化
                -->
                <svg class="diamond-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- ベースライン -->
                    <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="#2e3338" stroke-width="1.5" stroke-dasharray="4 3"/>
                    <!-- 2塁 (上) -->
                    <rect id="base-2" x="41" y="3"  width="18" height="18" rx="3" class="base-svg" data-base="2"/>
                    <!-- 1塁 (右) -->
                    <rect id="base-1" x="82" y="41" width="18" height="18" rx="3" class="base-svg" data-base="1"/>
                    <!-- 3塁 (左) -->
                    <rect id="base-3" x="0"  y="41" width="18" height="18" rx="3" class="base-svg" data-base="3"/>
                    <!-- ホーム (下) -->
                    <polygon points="50,82 58,88 55,97 45,97 42,88" fill="#2e3338" stroke="#555" stroke-width="1.5"/>
                    <!-- ラベル -->
                    <text x="50" y="17"  text-anchor="middle" class="base-label">2</text>
                    <text x="91" y="55"  text-anchor="middle" class="base-label">1</text>
                    <text x="9"  y="55"  text-anchor="middle" class="base-label">3</text>
                    <text x="50" y="94"  text-anchor="middle" class="base-label home-label">H</text>
                </svg>
            </div>
        </div>
    </div>

    <!-- ① メインメニュー -->
    <div id="pitch-result" class="action-grid">
        <button id="BSO" class="btn">BSO</button>
        <button id="OUT" class="btn btn-out">アウト</button>
        <button id="HIT" class="btn btn-hit">安打</button>
        <button id="btn-other" class="btn" disabled style="opacity:.3;">進塁他</button>
    </div>

    <!-- ② BSO詳細 -->
    <div id="BSO-detail" class="action-grid hidden">
        <button id="btn-looking" class="btn">見逃し</button>
        <button id="btn-swing"   class="btn">空振り</button>
        <button id="btn-foul"    class="btn">ファール</button>
        <button id="btn-ball"    class="btn">ボール</button>
    </div>

    <!-- ③ アウト種別 -->
    <div id="out-type" class="action-grid hidden">
        <button class="btn" data-out-type="GO">ゴロ</button>
        <button class="btn" data-out-type="F">フライ</button>
        <button class="btn" data-out-type="L">ライナー</button>
        <button class="btn" data-out-type="K">三振</button>
        <button class="btn btn-error" data-out-type="E">エラー</button>
    </div>

    <!-- ④ アウト守備番号入力パネル (ゴロ/フライ/ライナー用) -->
    <div id="fielder-panel" class="fielder-panel hidden">
        <div class="fielder-hint" id="fielder-hint">捕球した守備番号をタップ（複数で送球経路）</div>
        <div class="fielder-preview-row">
            <span class="fielder-preview" id="fielder-preview">-</span>
            <button id="fielder-undo" class="btn-icon" title="1つ戻す">⌫</button>
        </div>
        <div class="fielder-grid">
            <!--
              フィールド配置イメージに合わせた並び:
              上段: 外野 左(7) 中(8) 右(9)
              中段: 内野 三(5) 遊(6) 二(4) 一(3)
              下段: 投(1) 捕(2)
            -->
            <button class="fnum" data-pos="7">7<span>左</span></button>
            <button class="fnum" data-pos="8">8<span>中</span></button>
            <button class="fnum" data-pos="9">9<span>右</span></button>
            <button class="fnum" data-pos="5">5<span>三</span></button>
            <button class="fnum" data-pos="6">6<span>遊</span></button>
            <button class="fnum" data-pos="4">4<span>二</span></button>
            <button class="fnum" data-pos="3">3<span>一</span></button>
            <button class="fnum" data-pos="1">1<span>投</span></button>
            <button class="fnum" data-pos="2">2<span>捕</span></button>
        </div>
        <button id="fielder-confirm" class="btn btn-confirm">記録する</button>
    </div>

    <!-- ⑤ 安打種別 -->
    <div id="hit-type" class="action-grid hidden">
        <button class="btn btn-hit" data-hit-type="1B">単打</button>
        <button class="btn btn-hit" data-hit-type="2B">二塁打</button>
        <button class="btn btn-hit" data-hit-type="3B">三塁打</button>
        <button class="btn btn-hr"  data-hit-type="HR">本塁打</button>
    </div>

    <!-- ⑥ 安打方向 -->
    <div id="hit-direction" class="action-grid hidden">
        <button class="btn" data-dir="内野">内野安打</button>
        <button class="btn" data-dir="左">レフト</button>
        <button class="btn" data-dir="左中">左中間</button>
        <button class="btn" data-dir="中">センター</button>
        <button class="btn" data-dir="右中">右中間</button>
        <button class="btn" data-dir="右">ライト</button>
    </div>

    <!-- 戻るボタン -->
    <div class="return-wrap">
        <button id="input-return" class="btn">戻る</button>
    </div>

    <!-- プレーログ -->
    <div class="log-section">
        <div class="log-header">
            <span class="log-title">プレーログ</span>
            <button id="log-clear" class="btn-clear">クリア</button>
        </div>
        <div id="play-log" class="play-log">
            <p class="log-empty">まだ記録がありません</p>
        </div>
    </div>

    <script src="system_v3.js"></script>
</body>
</html>
